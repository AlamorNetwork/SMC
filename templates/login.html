<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC Bot | ورود به پنل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slytherin: { bg: '#050a15', card: '#0f172a', accent: '#10b981' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slytherin-bg text-slate-300 min-h-screen font-sans flex items-center justify-center p-4 relative overflow-hidden">
    <div class="absolute top-1/4 right-1/4 w-64 h-64 rounded-full blur-[100px] opacity-20 bg-slytherin-accent pointer-events-none"></div>
    <div class="absolute bottom-1/4 left-1/4 w-80 h-80 rounded-full blur-[120px] opacity-5 bg-white pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10 bg-slytherin-card/50 backdrop-blur-xl border border-white/10 p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <i class="fa-solid fa-robot text-4xl text-slytherin-accent mb-3 drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]"></i>
            <h1 class="text-2xl font-bold text-white">پنل مدیریت ربات SMC</h1>
            <p class="text-sm opacity-60 mt-1">جهت دسترسی به داشبورد، وارد شوید</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/20 text-red-400 p-3 rounded-xl text-sm font-bold mb-6 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label class="block text-sm mb-1.5 opacity-80">نام کاربری</label>
                <input type="text" name="username" required
                    class="w-full p-3.5 rounded-xl bg-white/5 border border-white/10 focus:bg-white/10 focus:border-transparent focus:outline-none focus:ring-2 focus:ring-slytherin-accent transition-all text-left" dir="ltr">
            </div>
            
            <div>
                <label class="block text-sm mb-1.5 opacity-80">رمز عبور</label>
                <input type="password" name="password" required
                    class="w-full p-3.5 rounded-xl bg-white/5 border border-white/10 focus:bg-white/10 focus:border-transparent focus:outline-none focus:ring-2 focus:ring-slytherin-accent transition-all text-left" dir="ltr">
            </div>

            <button type="submit" class="w-full py-4 rounded-xl font-bold text-black bg-slytherin-accent shadow-[0_0_20px_rgba(16,185,129,0.2)] hover:-translate-y-0.5 transition-all mt-6">
                ورود به سیستم
            </button>
        </form>
    </div>
</body>
</html>
