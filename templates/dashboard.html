<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>داشبورد هوشمند SMC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { 
            background: radial-gradient(circle at top left, #0f172a, #020617, #000000); 
            color: #cbd5e1; 
        }
        /* افکت شیشه‌ای بسیار جذاب */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .glow-green { text-shadow: 0 0 10px rgba(16, 185, 129, 0.7); }
        .glow-red { text-shadow: 0 0 10px rgba(244, 63, 94, 0.7); }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans relative overflow-x-hidden">
    <div class="fixed top-0 left-1/4 w-96 h-96 bg-emerald-600/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-0 right-1/4 w-96 h-96 bg-blue-600/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div x-data="dashboardApp()" x-init="connectWebSocket()" class="w-full flex-1 flex flex-col z-10 relative">
        
        <header class="h-20 border-b border-white/10 glass-panel flex items-center justify-between px-8 sticky top-0 z-30">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-emerald-500 to-blue-500 flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.5)]">
                    <i class="fa-solid fa-robot text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-white tracking-wide">رادار اسمارت مانی</h1>
            </div>
            <div class="flex items-center gap-4">
                <span class="px-4 py-2 bg-white/5 rounded-xl border border-white/10 text-sm font-bold flex items-center gap-2"
                      :class="{'text-emerald-400': bot_state.status.includes('آماده'), 'text-yellow-400': !bot_state.status.includes('آماده')}">
                    <i class="fa-solid fa-circle-bolt animate-pulse"></i>
                    <span x-text="bot_state.status"></span>
                </span>
                <a href="/logout" class="text-rose-400/80 hover:text-rose-400 font-bold text-sm bg-rose-500/10 px-4 py-2 rounded-xl transition-all">خروج <i class="fa-solid fa-power-off ml-1"></i></a>
            </div>
        </header>

        <main class="p-8 max-w-7xl mx-auto space-y-8 w-full flex-1">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-panel p-6 rounded-3xl transition-transform hover:scale-105">
                    <div class="text-white/50 text-sm mb-1 flex items-center gap-2"><i class="fa-solid fa-satellite-dish"></i> وضعیت آپدیت</div>
                    <div class="text-xl font-bold text-blue-400 mt-2" x-text="bot_state.last_update"></div>
                </div>
                <div class="glass-panel p-6 rounded-3xl transition-transform hover:scale-105 relative overflow-hidden">
                    <div class="text-white/50 text-sm mb-1 flex items-center gap-2"><i class="fa-solid fa-crosshairs"></i> سیگنال‌های امروز</div>
                    <div class="text-3xl font-bold text-emerald-400 mt-2" x-text="bot_state.signals_today"></div>
                </div>
                <div class="glass-panel p-6 rounded-3xl transition-transform hover:scale-105">
                    <div class="text-white/50 text-sm mb-1 flex items-center gap-2"><i class="fa-solid fa-wallet"></i> سود / زیان (PnL)</div>
                    <div class="text-3xl font-bold text-purple-400 mt-2" x-text="'% ' + bot_state.total_pnl"></div>
                </div>
            </div>

            <div>
                <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-display text-emerald-500"></i> مانیتورینگ زنده جفت‌ارزها
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <template x-for="(data, symbol) in bot_state.market_data" :key="symbol">
                        <div class="glass-panel p-6 rounded-3xl flex flex-col justify-between border-t border-t-white/20 hover:border-emerald-500/50 transition-all duration-300">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-xl font-bold text-white tracking-wider" x-text="symbol"></h3>
                                    <div class="text-sm font-medium mt-1" 
                                         :class="{'text-emerald-400': data.trend === 'Bullish', 'text-rose-400': data.trend === 'Bearish', 'text-gray-400': data.trend === 'Neutral'}"
                                         x-text="'روند: ' + data.trend">
                                    </div>
                                </div>
                                <div class="text-xl font-mono text-white/90 font-bold bg-black/40 px-3 py-1 rounded-lg" x-text="'$' + data.price"></div>
                            </div>
                            
                            <div class="mt-4 p-3 rounded-xl bg-black/30 border border-black/50 text-sm font-medium">
                                <span :class="data.color" x-text="data.msg"></span>
                            </div>
                        </div>
                    </template>
                </div>
                
                <div x-show="Object.keys(bot_state.market_data).length === 0" class="text-center py-10 glass-panel rounded-3xl">
                    <i class="fa-solid fa-spinner fa-spin text-4xl text-emerald-500 mb-4"></i>
                    <p class="text-white/60">در حال دریافت و تحلیل کندل‌ها...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function dashboardApp() {
            return {
                bot_state: {
                    status: "اتصال به هسته...",
                    active_pairs: [],
                    signals_today: 0,
                    open_positions: 0,
                    total_pnl: 0,
                    last_update: "در حال همگام‌سازی...",
                    market_data: {}
                },
                
                connectWebSocket() {
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const wsUrl = `${protocol}//${window.location.host}/ws`;
                    const ws = new WebSocket(wsUrl);

                    ws.onopen = () => console.log("🟢 متصل به وب‌سوکت");
                    
                    ws.onmessage = (event) => {
                        this.bot_state = JSON.parse(event.data);
                    };

                    ws.onclose = () => {
                        this.bot_state.status = "اتصال قطع شد 🔴";
                        setTimeout(() => this.connectWebSocket(), 3000);
                    };
                }
            }
        }
    </script>
</body>
</html>
