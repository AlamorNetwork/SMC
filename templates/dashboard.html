<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>داشبورد ربات SMC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background-color: #050508; color: #cbd5e1; }
        .glass-panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">
    
    <div x-data="dashboardApp()" x-init="connectWebSocket()" class="w-full flex-1 flex flex-col">
        
        <header class="h-20 border-b border-white/5 bg-black/20 backdrop-blur-md flex items-center justify-between px-8 sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-chart-line text-2xl text-emerald-400"></i>
                <h1 class="text-xl font-bold text-white">مانیتورینگ لایو SMC</h1>
            </div>
            <div class="flex items-center gap-4">
                <span class="px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded-full text-xs font-bold border border-emerald-500/20 shadow-[0_0_15px_rgba(16,185,129,0.15)]"
                      x-text="'وضعیت: ' + bot_state.status">
                </span>
                <a href="/logout" class="text-red-400 hover:text-red-300 font-bold text-sm"><i class="fa-solid fa-arrow-right-from-bracket transform rotate-180 ml-1"></i> خروج</a>
            </div>
        </header>

        <main class="p-8 max-w-7xl mx-auto space-y-6 w-full flex-1">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-panel p-6 rounded-2xl shadow-xl hover:bg-white/5 transition-colors">
                    <div class="text-white/50 text-sm mb-2">تعداد ارزهای در حال مانیتور</div>
                    <div class="text-3xl font-bold text-white" x-text="bot_state.active_pairs.length + ' نماد'"></div>
                    <div class="text-xs text-emerald-400/80 mt-3" x-text="bot_state.last_update"></div>
                </div>
                <div class="glass-panel p-6 rounded-2xl shadow-xl hover:bg-white/5 transition-colors relative overflow-hidden">
                    <div class="text-white/50 text-sm mb-2">سیگنال‌های باز / امروز</div>
                    <div class="text-3xl font-bold text-blue-400" x-text="bot_state.open_positions + ' / ' + bot_state.signals_today"></div>
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-blue-500 rounded-full blur-[40px] opacity-20 animate-pulse" x-show="bot_state.signals_today > 0"></div>
                </div>
                <div class="glass-panel p-6 rounded-2xl shadow-xl hover:bg-white/5 transition-colors">
                    <div class="text-white/50 text-sm mb-2">سود / زیان کل</div>
                    <div class="text-3xl font-bold text-emerald-400" x-text="'% ' + bot_state.total_pnl"></div>
                </div>
            </div>

            <div class="glass-panel rounded-2xl p-6 shadow-xl mt-8">
                <h2 class="text-lg font-bold text-white mb-6 border-b border-white/10 pb-3"><i class="fa-solid fa-list-check ml-2"></i>واچ‌لیست فعال</h2>
                <div class="flex flex-wrap gap-3">
                    <template x-for="pair in bot_state.active_pairs" :key="pair">
                        <span class="px-4 py-2 bg-black/40 border border-white/10 rounded-xl text-sm font-bold text-white/80 hover:text-white hover:border-emerald-500/50 transition-all cursor-pointer"
                              x-text="pair">
                        </span>
                    </template>
                </div>
            </div>
        </main>
    </div>

    <script>
        function dashboardApp() {
            return {
                // مقادیر اولیه از سمت سرور
                bot_state: {
                    status: "{{ state.status }}",
                    active_pairs: {{ state.active_pairs | tojson | safe }},
                    signals_today: {{ state.signals_today }},
                    open_positions: {{ state.open_positions }},
                    total_pnl: {{ state.total_pnl }},
                    last_update: "{{ state.last_update }}"
                },
                
                connectWebSocket() {
                    // ساخت لینک وب‌سوکت داینامیک
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const wsUrl = `${protocol}//${window.location.host}/ws`;
                    const ws = new WebSocket(wsUrl);

                    ws.onopen = () => console.log("🟢 متصل به هسته SMC...");
                    
                    // به محض دریافت پیام، کل مقادیر در کسری از ثانیه روی صفحه آپدیت می‌شود
                    ws.onmessage = (event) => {
                        this.bot_state = JSON.parse(event.data);
                        console.log("لایو آپدیت:", this.bot_state);
                    };

                    ws.onclose = () => {
                        console.log("🔴 ارتباط قطع شد. تلاش مجدد...");
                        this.bot_state.status = "اتصال قطع شد 🔴";
                        setTimeout(() => this.connectWebSocket(), 3000);
                    };
                }
            }
        }
    </script>
</body>
</html>
